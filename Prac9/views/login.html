<div class="container">
  <h3>Login</h3>

  <form ng-submit="login()">
    <input
      type="text"
      placeholder="Username"
      ng-model="loginUser.username"
      required
    />

    <input
      type="password"
      placeholder="Password"
      ng-model="loginUser.password"
      required
    />

    <button type="submit">Login</button>
  </form>

  <p>{{message}}</p>
</div>
