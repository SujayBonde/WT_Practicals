<!doctype html>
<html>
  <head>
    <title>Stylish JavaScript Calculator</title>

    <style>
      /* Page background */
      body {
        height: 100vh;
        margin: 0;
        background: linear-gradient(180deg, #f4f6f9, #e9ecf1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        color: #333;
      }

      /* Calculator container */
      .calculator {
        width: 340px;
        background: #ffffff;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        border: 1px solid #e2e6ea;
      }

      .calculator h2 {
        margin-bottom: 18px;
        font-weight: 600;
        color: #2c3e50;
        letter-spacing: 0.5px;
      }

      /* Input fields */
      input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        margin: 6px 0;
        font-size: 17px;
        text-align: right;
        border-radius: 8px;
        border: 1px solid #cfd4da;
        background-color: #fafafa;
        transition:
          border 0.2s,
          box-shadow 0.2s;
        box-sizing: border-box;
      }

      input[type="text"]:focus {
        border-color: #4a6cf7;
        box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.15);
        outline: none;
        background-color: #ffffff;
      }

      /* Button grid */
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 18px;
      }

      /* Base button */
      button {
        height: 48px;
        font-size: 16px;
        font-weight: 500;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background-color 0.2s,
          box-shadow 0.2s,
          transform 0.1s;
      }

      button:active {
        transform: scale(0.97);
      }

      /* Number buttons */
      .num {
        background-color: #f8f9fa;
        border-color: #dee2e6;
        color: #333;
      }

      .num:hover {
        background-color: #e9ecef;
      }

      /* Operator buttons */
      .op {
        background-color: #4a6cf7;
        color: #ffffff;
      }

      .op:hover {
        background-color: #3b5bdb;
      }

      /* Special buttons (square / prompt) */
      .special {
        background-color: #495057;
        color: #ffffff;
      }

      .special:hover {
        background-color: #343a40;
      }

      /* Wide buttons */
      .wide {
        grid-column: span 2;
      }

      /* Footer button */
      .footer-btn {
        margin-top: 18px;
        width: 100%;
        background-color: #198754;
        color: #ffffff;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
      }

      .footer-btn:hover {
        background-color: #157347;
      }
    </style>

    <script>
      function calculate(op) {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;
        let result;

        if (n1 === "" || (n2 === "" && op !== "square")) {
          alert("Please enter valid numbers!");
          return;
        }

        n1 = parseFloat(n1);
        n2 = parseFloat(n2);

        if (isNaN(n1) || (isNaN(n2) && op !== "square")) {
          alert("Invalid input! Enter numbers only.");
          return;
        }

        switch (op) {
          case "add":
            result = n1 + n2;
            break;
          case "sub":
            result = n1 - n2;
            break;
          case "mul":
            result = n1 * n2;
            break;
          case "div":
            if (n2 === 0) {
              alert("Division by zero not allowed!");
              return;
            }
            result = n1 / n2;
            break;
          case "square":
            result = n1 * n1;
            break;
        }

        document.getElementById("result").value = result;
      }

      function promptSquare() {
        let val = prompt("Enter a number:");
        if (val === null || val === "") {
          alert("Input cancelled!");
          return;
        }
        if (isNaN(val)) {
          alert("Invalid number!");
          return;
        }
        alert("Square of " + val + " is " + val * val);
      }
    </script>
  </head>

  <body>
    <div class="calculator">
      <h2>Calculator</h2>

      <input type="text" id="num1" placeholder="First number" />
      <input type="text" id="num2" placeholder="Second number" />
      <input type="text" id="result" placeholder="Result" readonly />

      <div class="buttons">
        <button class="op" onclick="calculate('add')">+</button>
        <button class="op" onclick="calculate('sub')">−</button>
        <button class="op" onclick="calculate('mul')">×</button>
        <button class="op" onclick="calculate('div')">÷</button>

        <button class="special wide" onclick="calculate('square')">x²</button>
        <button class="special wide" onclick="promptSquare()">Prompt x²</button>
      </div>
    </div>
  </body>
</html>
